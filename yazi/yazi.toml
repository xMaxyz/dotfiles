[mgr]
ratio = [1, 3, 4]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = true
linemode = "size"
show_hidden = true
show_symlink = true

[preview]
wrap = "no"

[opener]
[[opener.xdg]]
run = 'xdg-open "$@"'
desc = "System Open"

[open]
rules = [
	{ mime = "*", use = "xdg" }
]
